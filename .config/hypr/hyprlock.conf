$font = Hack Nerd Font
$text = rgb(26bbd9)
$input = rgb(e0e0e0)
$border = rgb(16161c)
$background = rgb(1c1e26)

general {
    grace = 1
    hide_cursor = true
}

background {
    monitor =
    path = $HOME/.local/share/backgrounds/wallpaper.png  # NOTE only png supported for now
    blur_passes = 3 # 0 disables blurring
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 175, 50
    outline_thickness = 2
    dots_size = 0.25 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.25 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $border
    inner_color = $background
    font_color = $input
    fade_on_empty = false
    placeholder_text = <i>Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # Can be set to empty
    position = 0, -300
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%a, %B %d")"
    color = $text
    font_size = 30
    font_family = $font
    position = 0, 300
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M")"
    color = $text
    font_size = 75
    font_family = $font
    position = 0, 200
    halign = center
    valign = center
}

# User
label {
    monitor =
    text =  $USER
    color = $text
    font_size = 30
    font_family = Cascadia Code Bold
    position = 0, -200
    halign = center
    valign = center
}
